<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Nexus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        
        body {
            margin: 0;
            overflow: hidden;
            background-color: #020617;
            font-family: 'Orbitron', sans-serif;
            touch-action: none;
            color: #fff;
        }
        canvas {
            display: block;
        }
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
            z-index: 10;
            background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.4) 100%);
        }
        .menu-card {
            pointer-events: auto;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border: 2px solid #22d3ee;
            padding: 3rem;
            border-radius: 1.5rem;
            text-align: center;
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.3);
        }
        .btn {
            background: #0891b2;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 9999px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid #22d3ee;
            margin-top: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .btn:hover {
            background: #22d3ee;
            box-shadow: 0 0 20px #22d3ee;
            transform: translateY(-3px);
        }
        .score-box {
            text-shadow: 0 0 10px rgba(34, 211, 238, 0.8);
        }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div class="flex justify-between items-start">
            <div class="score-box">
                <div class="text-xs opacity-60 uppercase tracking-widest">Nexus Data</div>
                <div class="text-3xl font-bold text-cyan-400" id="current-score">0</div>
            </div>
            <div class="score-box text-right">
                <div class="text-xs opacity-60 uppercase tracking-widest">High Record</div>
                <div class="text-xl font-bold text-pink-500" id="high-score">0</div>
            </div>
        </div>

        <div id="start-menu" class="flex flex-col items-center justify-center flex-grow">
            <div class="menu-card">
                <h1 class="text-5xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600">NEON NEXUS</h1>
                <p class="mb-6 text-cyan-100/70 tracking-wide uppercase text-sm">Trick the Hunter Cubes into colliding!</p>
                <div class="text-xs text-cyan-500/50 mb-8 space-y-1">
                    <p>● Score by causing Cube collisions</p>
                    <p>● Mouse/Touch to move</p>
                </div>
                <button id="start-btn" class="btn">Initialize</button>
            </div>
        </div>

        <div id="game-over-menu" class="flex flex-col items-center justify-center flex-grow hidden">
            <div class="menu-card border-pink-500 shadow-[0_0_30px_rgba(236,72,153,0.3)]">
                <h2 class="text-4xl font-bold mb-2 text-pink-500">SYSTEM CRASH</h2>
                <p class="text-xl mb-6 text-cyan-100">Fragments Collected: <span id="final-score" class="font-bold text-cyan-400">0</span></p>
                <button id="restart-btn" class="btn !border-pink-500 !bg-pink-700 hover:!bg-pink-500">Reboot</button>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('current-score');
        const highScoreEl = document.getElementById('high-score');
        const finalScoreEl = document.getElementById('final-score');
        const startMenu = document.getElementById('start-menu');
        const gameOverMenu = document.getElementById('game-over-menu');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');

        let animationId;
        let score = 0;
        let highScore = 0;
        let gameActive = false;

        const player = {
            x: 0,
            y: 0,
            radius: 12,
            color: '#22d3ee',
            speed: 0.18
        };

        const mouse = { x: 0, y: 0 };
        let enemies = [];
        let particles = [];

        class Particle {
            constructor(x, y, color, speedMult = 1) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 12 * speedMult;
                this.speedY = (Math.random() - 0.5) * 12 * speedMult;
                this.alpha = 1;
                this.decay = 0.015 + Math.random() * 0.02;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 5;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class Enemy {
            constructor(isInitial = false) {
                this.size = 22;
                this.color = '#f43f5e';
                this.spawn(isInitial);
            }

            spawn(isInitial) {
                if (isInitial) {
                    // Spawn further away from center initially
                    const angle = Math.random() * Math.PI * 2;
                    const dist = Math.max(canvas.width, canvas.height) * 0.6;
                    this.x = canvas.width/2 + Math.cos(angle) * dist;
                    this.y = canvas.height/2 + Math.sin(angle) * dist;
                } else {
                    const side = Math.floor(Math.random() * 4);
                    if (side === 0) { this.x = Math.random() * canvas.width; this.y = -50; }
                    else if (side === 1) { this.x = canvas.width + 50; this.y = Math.random() * canvas.height; }
                    else if (side === 2) { this.x = Math.random() * canvas.width; this.y = canvas.height + 50; }
                    else { this.x = -50; this.y = Math.random() * canvas.height; }
                }
                this.speed = 2.2 + (Math.random() * 0.5);
                this.alive = true;
            }

            update() {
                const dx = player.x - this.x;
                const dy = player.y - this.y;
                const angle = Math.atan2(dy, dx);
                this.x += Math.cos(angle) * this.speed;
                this.y += Math.sin(angle) * this.speed;
            }

            draw() {
                ctx.save();
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.translate(this.x, this.y);
                // Subtle rotation based on movement
                ctx.rotate(Math.atan2(player.y - this.y, player.x - this.x) + Math.PI/4);
                ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                // Add a core
                ctx.fillStyle = '#fff';
                ctx.fillRect(-this.size/4, -this.size/4, this.size/2, this.size/2);
                ctx.restore();
            }

            explode() {
                this.alive = false;
                for(let i=0; i<15; i++) {
                    particles.push(new Particle(this.x, this.y, this.color));
                }
            }
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (!gameActive) {
                player.x = canvas.width / 2;
                player.y = canvas.height / 2;
            }
        }

        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('touchmove', (e) => { 
            mouse.x = e.touches[0].clientX; 
            mouse.y = e.touches[0].clientY; 
        }, { passive: false });

        function drawGrid() {
            ctx.strokeStyle = 'rgba(34, 211, 238, 0.05)';
            ctx.lineWidth = 1;
            const gridSize = 50;
            for(let x = 0; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for(let y = 0; y < canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }

        function checkPlayerCollision(p, e) {
            const distX = Math.abs(p.x - e.x);
            const distY = Math.abs(p.y - e.y);
            if (distX > (e.size / 2 + p.radius)) return false;
            if (distY > (e.size / 2 + p.radius)) return false;
            if (distX <= (e.size / 2)) return true;
            if (distY <= (e.size / 2)) return true;
            const dx = distX - e.size / 2;
            const dy = distY - e.size / 2;
            return (dx * dx + dy * dy <= (p.radius * p.radius));
        }

        function checkEnemyCollision(e1, e2) {
            const dist = Math.hypot(e1.x - e2.x, e1.y - e2.y);
            return dist < (e1.size);
        }

        function update() {
            if (!gameActive) return;

            // Clear screen with trail effect
            ctx.fillStyle = 'rgba(2, 6, 23, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawGrid();

            // Player movement
            player.x += (mouse.x - player.x) * player.speed;
            player.y += (mouse.y - player.y) * player.speed;

            // Draw player
            ctx.save();
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = player.color;
            ctx.shadowBlur = 20;
            ctx.shadowColor = player.color;
            ctx.fill();
            // Inner core
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius * 0.5, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.restore();

            // Handle Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].alpha <= 0) particles.splice(i, 1);
            }

            // Handle Enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.update();
                e.draw();

                // Player collision
                if (checkPlayerCollision(player, e)) {
                    endGame();
                    return;
                }

                // Enemy vs Enemy collision
                for (let j = i - 1; j >= 0; j--) {
                    const e2 = enemies[j];
                    if (checkEnemyCollision(e, e2)) {
                        e.explode();
                        e2.explode();
                        score += 100;
                        scoreEl.innerText = score;
                        break;
                    }
                }
            }

            // Cleanup dead enemies
            enemies = enemies.filter(e => e.alive);

            // Maintain enemy count
            const targetCount = 4 + Math.floor(score / 500);
            if (enemies.length < targetCount && Math.random() < 0.05) {
                enemies.push(new Enemy());
            }

            animationId = requestAnimationFrame(update);
        }

        function endGame() {
            gameActive = false;
            cancelAnimationFrame(animationId);
            
            if (score > highScore) {
                highScore = score;
                highScoreEl.innerText = highScore;
            }
            
            finalScoreEl.innerText = score;
            gameOverMenu.classList.remove('hidden');

            // Epic crash explosion
            for(let i=0; i<50; i++) {
                particles.push(new Particle(player.x, player.y, player.color, 2));
                particles.push(new Particle(player.x, player.y, '#f43f5e', 1.5));
            }
            
            const fadeLoop = () => {
                ctx.fillStyle = 'rgba(2, 6, 23, 0.15)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                particles.forEach((p, i) => {
                    p.update();
                    p.draw();
                    if(p.alpha <= 0) particles.splice(i, 1);
                });
                if(particles.length > 0) requestAnimationFrame(fadeLoop);
            };
            fadeLoop();
        }

        function startGame() {
            score = 0;
            scoreEl.innerText = '0';
            enemies = [];
            particles = [];
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
            mouse.x = player.x;
            mouse.y = player.y;
            gameActive = true;
            
            startMenu.classList.add('hidden');
            gameOverMenu.classList.add('hidden');
            
            for(let i=0; i<4; i++) enemies.push(new Enemy(true));
            
            requestAnimationFrame(update);
        }

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

    </script>
</body>
</html>
