<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Junedals gaming | Unblocked</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        :root {
            --bg-color: #0f172a;
            --text-color: #ffffff;
            --card-bg: rgba(15, 23, 42, 0.8);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-blue: #00659E;
            --input-bg: #1e293b;
        }

        body.light-theme {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.9);
            --border-color: rgba(0, 0, 0, 0.1);
            --input-bg: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
        }

        .game-card {
            transition: all 0.2s ease-in-out;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
        }

        .game-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-blue);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        #game-overlay, #legal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            background: #000;
        }

        #legal-overlay {
            background: rgba(0,0,0,0.85);
            z-index: 1100;
            align-items: center;
            justify-content: center;
        }

        iframe {
            width: 100%;
            height: calc(100% - 60px);
            border: none;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: var(--bg-color);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #334155;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="custom-scrollbar">

    <nav class="sticky top-0 z-50 glass px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <a href="/">
                <img src="https://www.jonkoping.se/images/18.12ea8e7716736a14f7a2026/1543307654797/logo-jkpg-vit-300px.png" alt="Logo" class="h-10 w-auto">
            </a>
            <h1 class="text-2xl font-800 tracking-tighter uppercase italic">Junedals gaming</h1>
        </div>
        <div class="flex items-center gap-4">
            <div class="relative hidden md:block">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="search" placeholder="Search library..." 
                    class="border border-slate-700 rounded-none py-2 pl-10 pr-4 focus:outline-none focus:ring-1 focus:ring-[#00659E] w-64 transition-all"
                    style="background-color: var(--input-bg); color: var(--text-color);">
            </div>
            <button onclick="toggleTheme()" class="p-2 hover:bg-slate-500/20 rounded-none transition-colors">
                <i id="theme-icon" class="fas fa-moon"></i>
            </button>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-8">
        <div class="mb-12 p-8 rounded-none bg-[#00659E] relative overflow-hidden border-l-8 border-white/20">
            <div class="relative z-10 max-w-2xl text-white">
                <h2 class="text-4xl md:text-5xl font-extrabold mb-4 uppercase tracking-tighter">Junedals gaming: Den obonkerade hemsidan</h2>
                <p class="text-blue-100 text-lg mb-6 font-light">Ja, jag vet att bilderna är skit. Men vem bryr sig? Spelen är peak. Btw denhär hemsidan non profit, all reklam revenue går inte till mig</p>
                <button onclick="document.getElementById('game-grid').scrollIntoView({behavior:'smooth'})" 
                    class="bg-white text-[#00659E] px-8 py-3 rounded-none font-bold hover:bg-blue-50 transition-all uppercase tracking-widest text-sm">
                    Browse Library
                </button>
            </div>
            <i class="fas fa-gamepad absolute -right-10 -bottom-10 text-[200px] text-white/10 -rotate-12"></i>
        </div>

        <div id="filter-bar" class="flex gap-2 mb-8 overflow-x-auto pb-2 no-scrollbar"></div>

        <div id="game-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
    </main>

    <footer class="border-t border-slate-800 mt-20 py-10 text-center text-slate-500 uppercase text-[10px] tracking-[0.3em]">
        <p>© 2026 Junedals gaming • powered by github pages</p>
    </footer>

    <div id="game-overlay">
        <div class="h-[60px] glass flex items-center justify-between px-6 border-b border-white/10">
            <div class="flex items-center gap-4">
                <button onclick="closeGame()" class="flex items-center gap-2 hover:text-[#00659E] transition-colors">
                    <i class="fas fa-times"></i>
                    <span class="font-bold uppercase tracking-widest text-xs">Close</span>
                </button>
                <div class="h-6 w-[1px] bg-slate-700"></div>
                <h3 id="current-game-title" class="font-bold text-[#00659E] uppercase text-sm tracking-widest">Game Title</h3>
            </div>
            <div class="flex items-center gap-4">
                <button id="legal-btn" class="px-3 py-1 border border-slate-500 text-slate-400 hover:text-white hover:border-white transition-all text-[10px] font-bold uppercase tracking-widest">Legal Info</button>
                <button onclick="toggleFullscreen()" class="p-2 hover:bg-slate-500/20"><i class="fas fa-expand"></i></button>
                <button onclick="reloadGame()" class="p-2 hover:bg-slate-500/20"><i class="fas fa-redo"></i></button>
            </div>
        </div>
        <iframe id="game-frame" src="" allowfullscreen></iframe>
    </div>

    <div id="legal-overlay" onclick="this.style.display='none'">
        <div class="glass p-8 max-w-sm w-full mx-4 rounded-none border-t-4 border-[#00659E]" onclick="event.stopPropagation()">
            <h2 class="text-xl font-black mb-6 uppercase tracking-tighter border-b border-white/10 pb-2">Legal Info</h2>
            <div id="legal-content" class="space-y-6"></div>
            <button onclick="document.getElementById('legal-overlay').style.display='none'" class="mt-8 w-full py-3 bg-[#00659E] text-white font-bold uppercase tracking-widest text-xs hover:bg-blue-700 transition-colors">Return</button>
        </div>
    </div>

    <script>
        const GAME_CONFIG = [
            { 
                id: 'slope', 
                name: 'Slope (original)', 
                link: 'https://storage.y8.com/y8-studio/unity_webgl/Gani/slope-game_2025_v3/', 
                folder: 'slope', 
                tag: 'casual', 
                status: ['Safe', 'External'] 
            },
            { 
                id: 'neon-nexus', 
                name: 'Neon Nexus', 
                folder: 'neon-nexus', 
                tag: 'action', 
                status: ['Safe', 'Virus Checked'] 
            },
            { 
                id: 'lumina', 
                name: 'Lumina', 
                folder: 'Lumina', 
                tag: 'puzzle', 
                status: ['Safe'] 
            },
            { 
                id: 'roulette', 
                name: 'Roulette', 
                folder: 'javascript-roulette-main', 
                tag: 'casino', 
                status: ['Safe', 'Virus Checked'] 
            },
            { 
                id: 'chess', 
                name: 'Chess', 
                folder: 'chess', 
                tag: 'board game', 
                status: ['Safe'] 
            },
            {
                id: 'fruitninja',
                name: 'Fruit Ninja',
                link: 'https://www.coolmathgames.com/sites/default/files/public_games/50823/?gd_sdk_referrer_url=https%3A%2F%2Fwww.coolmathgames.com%2F0-fruit-ninja',
                folder: 'fruitninja',
                tag: 'action',
                status: ['Safe', 'External']
            },
            {
                id: 'driftboss',
                name: 'Drift boss',
                link: 'https://gamecollections.me/game/owner/drift-boss-gm/',
                folder: 'driftboss',
                tag: 'Racing',
                status: ['Safe', 'External']
            },
            {
                id: 'ets2',
                name: 'Euro Truck Simulator 2 real 4K',
                link: 'https://kbhgames.com/wp-content/themes/v1/embed.php?url=https%3A%2F%2Fwww.madkidgames.com%2Ffull%2Ftruck-simulator-europe&canonical=https%3A%2F%2Fkbhgames.com%2Fgame%2Ftruck-simulator-europe&w=960&h=540&noad=1&pid=169323',
                folder: 'ets2',
                tag: 'Racing',
                status: ['Safe', 'External']
            },
            {
                id: 'gag',
                name: 'Grow a farm',
                link: 'https://growden.io/',
                folder: 'gag',
                tag: 'casual',
                status: ['Safe', 'External', 'Online']
            },
            {
                id: 'mario',
                name: 'Super mario bros',
                link: 'https://openhtml5games.github.io/games-mirror/dist/mariohtml5/main.html',
                folder: 'mario',
                tag: 'retro',
                status: ['Safe', 'External']
            }
        ];

        let currentFilter = 'All';

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            const icon = document.getElementById('theme-icon');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
        }

        const gameGrid = document.getElementById('game-grid');
        const filterBar = document.getElementById('filter-bar');
        const searchInput = document.getElementById('search');
        const overlay = document.getElementById('game-overlay');
        const gameFrame = document.getElementById('game-frame');
        const gameTitle = document.getElementById('current-game-title');

        window.handleImageError = function(img) {
            img.parentElement.innerHTML = `<div class="w-full h-full flex items-center justify-center bg-slate-800 text-slate-600"><i class="fas fa-gamepad text-4xl"></i></div>`;
        };

        function updateFilters() {
            const tags = ['All', ...new Set(GAME_CONFIG.map(g => g.tag).filter(Boolean))];
            filterBar.innerHTML = '';
            tags.forEach(tag => {
                const btn = document.createElement('button');
                btn.className = `px-5 py-2 rounded-none font-bold uppercase text-[10px] tracking-widest transition-all ${currentFilter === tag ? 'bg-[#00659E] text-white' : 'glass text-slate-400 hover:text-white'}`;
                btn.innerText = tag;
                btn.onclick = () => {
                    currentFilter = tag;
                    updateFilters();
                    renderGames(searchInput.value);
                };
                filterBar.appendChild(btn);
            });
        }

        function renderGames(search = '') {
            gameGrid.innerHTML = '';
            const filtered = GAME_CONFIG.filter(g => {
                const matchesSearch = g.name.toLowerCase().includes(search.toLowerCase());
                const matchesTab = currentFilter === 'All' || g.tag === currentFilter;
                return matchesSearch && matchesTab;
            });

            filtered.forEach(game => {
                // Now always checks folder first for logo, regardless of if it's a link or local game
                const logoPath = game.folder ? `game/${game.folder}/logo.png` : 'https://via.placeholder.com/400x225?text=No+Preview';
                
                let statusBadges = '';
                if (game.status) {
                    game.status.forEach(s => {
                        statusBadges += `<span class="text-[8px] px-1.5 py-0.5 bg-slate-500/10 border border-white/5 text-slate-500 font-bold uppercase tracking-widest">${s}</span>`;
                    });
                }

                const card = document.createElement('div');
                card.className = 'game-card rounded-none overflow-hidden cursor-pointer group';
                card.onclick = () => openGame(game);
                
                card.innerHTML = `
                    <div class="aspect-video relative overflow-hidden bg-slate-900">
                        <img src="${logoPath}" class="w-full h-full object-fill group-hover:scale-110 transition-transform duration-700" onerror="handleImageError(this)">
                        <div class="absolute inset-0 bg-[#00659E]/20 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    </div>
                    <div class="p-4 bg-slate-900/50">
                        <h4 class="font-bold text-xs uppercase tracking-widest truncate text-white">${game.name}</h4>
                        <div class="flex flex-wrap gap-1 mt-3">
                            <span class="text-[9px] px-2 py-0.5 bg-[#00659E] text-white font-bold uppercase tracking-widest">${game.tag}</span>
                            ${statusBadges}
                        </div>
                    </div>
                `;
                gameGrid.appendChild(card);
            });
        }

        function openGame(game) {
            document.body.style.overflow = 'hidden';
            overlay.style.display = 'block';
            gameTitle.innerText = game.name;
            gameFrame.src = game.link ? game.link : `game/${game.folder}/index.html`;
            
            const legalBtn = document.getElementById('legal-btn');
            if (game.folder) {
                legalBtn.style.display = 'block';
                legalBtn.onclick = (e) => {
                    e.stopPropagation();
                    showLegal(game.folder);
                };
            } else {
                legalBtn.style.display = 'none';
            }
        }

        async function showLegal(folder) {
            const content = document.getElementById('legal-content');
            const legalOverlay = document.getElementById('legal-overlay');
            
            try {
                const response = await fetch(`game/${folder}/legal.txt`);
                if (!response.ok) return;

                const text = await response.text();
                const lines = text.split(/\r?\n/).map(l => l.replace(/[{}"\s]/g, '').trim());
                
                const creator = lines[0];
                const license = lines[1];

                let html = `<div><p class="text-[10px] text-slate-500 uppercase font-black tracking-widest mb-1">Created By</p><p class="text-sm text-white font-bold uppercase">${creator || 'Unknown'}</p></div>`;
                
                if (license && license.toLowerCase() !== "none") {
                    html += `<div><p class="text-[10px] text-slate-500 uppercase font-black tracking-widest mb-1">License Type</p><p class="text-xs italic text-slate-300">${license}</p></div>`;
                }
                
                content.innerHTML = html;
                legalOverlay.style.display = 'flex';
            } catch (e) {
                console.error("Legal info fetch failed.");
            }
        }

        function closeGame() {
            document.body.style.overflow = 'auto';
            overlay.style.display = 'none';
            gameFrame.src = '';
        }

        function reloadGame() {
            const currentSrc = gameFrame.src;
            gameFrame.src = 'about:blank';
            setTimeout(() => { gameFrame.src = currentSrc; }, 50);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) overlay.requestFullscreen();
            else document.exitFullscreen();
        }

        searchInput.addEventListener('input', (e) => renderGames(e.target.value));
        
        window.onload = () => {
            updateFilters();
            renderGames();
        };
    </script>
</body>
</html>
